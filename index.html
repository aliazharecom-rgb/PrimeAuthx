<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PRIME AUTH - Login</title>
    <link rel="icon" type="image/png" href="https://files.catbox.moe/o4gz3k.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
    <style>
        *{ margin:0; padding:0; box-sizing:border-box; }
        body{
            font-family:'Inter',sans-serif;
            background:#0b0c0f;
            color:#edf1fb;
            min-height:100vh;
            display:flex;
            align-items:center;
            justify-content:center;
            padding:20px;
            background:radial-gradient(1200px 700px at 20% 0%, rgba(136,113,255,.1), transparent 60%), radial-gradient(900px 600px at 85% 20%, rgba(143,83,255,.08), transparent 60%), #0b0c0f;
        }
        .login-card{
            background:rgba(18,18,30,.95);
            padding:48px 40px;
            border-radius:32px;
            max-width:440px;
            width:100%;
            border:1px solid rgba(255,255,255,.06);
            box-shadow:0 25px 60px rgba(0,0,0,.6);
            text-align:center;
        }
        .logo-img {
            width: 80px;
            height: 80px;
            margin: 0 auto 16px;
            display: block;
            border-radius: 16px;
        }
        .logo-text{ font-size:36px; font-weight:900; }
        .logo-text span{ color:#8871ff; }
        .tagline{ color:#6b7280; font-size:13px; letter-spacing:3px; text-transform:uppercase; margin-bottom:28px; }
        .divider{ display:flex; align-items:center; gap:16px; margin:20px 0; }
        .divider::before, .divider::after{ content:''; flex:1; height:1px; background:rgba(255,255,255,.06); }
        .divider span{ color:#4b5563; font-size:12px; font-weight:600; text-transform:uppercase; }
        .btn-primary{
            width:100%; padding:14px; border-radius:12px; border:none;
            background:linear-gradient(135deg,#8871ff,#6b55ff); color:#fff;
            font-size:16px; font-weight:700; cursor:pointer; transition:all .2s;
            font-family:'Inter',sans-serif;
        }
        .btn-primary:hover{ transform:translateY(-2px); box-shadow:0 8px 24px rgba(136,113,255,.3); }
        .oauth-buttons{ display:flex; gap:12px; margin-top:16px; }
        .oauth-btn{
            flex:1; padding:12px; border-radius:12px; border:1px solid rgba(255,255,255,.06);
            background:rgba(255,255,255,.04); color:#fff; font-size:14px; font-weight:600;
            cursor:pointer; transition:all .2s; display:flex; align-items:center; justify-content:center; gap:8px;
            font-family:'Inter',sans-serif;
        }
        .oauth-btn:hover{ background:rgba(255,255,255,.08); border-color:rgba(255,255,255,.12); }
        .oauth-btn.discord:hover{ background:rgba(88,101,242,.15); border-color:#5865f2; }
        .oauth-btn.google svg{ width:20px; height:20px; }
        .footer{ margin-top:24px; color:#6b7280; font-size:13px; }
        .footer a{ color:#8871ff; text-decoration:none; }
        .status-badge{
            display:inline-block; margin-top:16px; padding:4px 16px; border-radius:20px;
            background:rgba(74,222,128,.12); color:#4ade80; border:1px solid rgba(74,222,128,.15);
            font-size:11px; font-weight:600;
        }
        @media(max-width:480px){ .login-card{ padding:32px 24px; } }
    </style>
</head>
<body>

<div class="login-card">
    <img class="logo-img" src="https://files.catbox.moe/o4gz3k.png" alt="PRIME AUTH" />
    <div class="logo-text">PRIME<span>AUTH</span></div>
    <p class="tagline">SECURE TODAY, SAFE TOMORROW</p>

    <div class="divider"><span>Continue with</span></div>

    <button class="btn-primary" onclick="window.location.href='/auth/google'">🚀 Sign in with Google</button>

    <div class="oauth-buttons">
        <button class="oauth-btn discord" onclick="window.location.href='/auth/discord'">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M20.222 4.616a18.84 18.84 0 0 0-4.658-1.445.034.034 0 0 0-.034.014 12.72 12.72 0 0 0-.653 1.325 17.52 17.52 0 0 0-5.255 0 12.72 12.72 0 0 0-.654-1.325.034.034 0 0 0-.034-.014A18.817 18.817 0 0 0 3.778 4.616a.036.036 0 0 0-.012.012A19.216 19.216 0 0 0 .24 17.476a.036.036 0 0 0 .012.024 19.008 19.008 0 0 0 5.548 2.79.035.035 0 0 0 .037-.012 12.719 12.719 0 0 0 1.034-1.677.034.034 0 0 0-.019-.048 12.47 12.47 0 0 1-1.584-.753.034.034 0 0 1-.01-.056c.107-.08.213-.162.313-.247a.034.034 0 0 1 .037-.004 17.906 17.906 0 0 0 5.519 1.453 17.897 17.897 0 0 0 5.553-1.453.034.034 0 0 1 .038.004c.1.085.207.168.314.247a.034.034 0 0 1-.01.056 12.565 12.565 0 0 1-1.583.753.034.034 0 0 0-.019.048c.294.508.637.995 1.034 1.677a.035.035 0 0 0 .037.012 19.004 19.004 0 0 0 5.548-2.79.036.036 0 0 0 .012-.024 19.216 19.216 0 0 0-3.526-12.848.036.036 0 0 0-.012-.012zM8.024 15.151c-1.082 0-1.972-.994-1.972-2.21 0-1.216.873-2.21 1.972-2.21 1.1 0 1.972.994 1.972 2.21 0 1.216-.873 2.21-1.972 2.21zm7.952 0c-1.083 0-1.973-.994-1.973-2.21 0-1.216.874-2.21 1.973-2.21 1.1 0 1.973.994 1.973 2.21 0 1.216-.874 2.21-1.973 2.21z"/></svg>
            Discord
        </button>
        <button class="oauth-btn google" onclick="window.location.href='/auth/google'">
            <svg viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59A14.5 14.5 0 019.5 24c0-1.59.28-3.14.76-4.59l-7.98-6.19A23.99 23.99 0 000 24c0 3.77.87 7.35 2.56 10.56l7.97-5.97z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 5.97C6.51 42.62 14.62 48 24 48z"/></svg>
            Google
        </button>
    </div>

    <div class="status-badge">● System Operational</div>

    <div class="footer">
        Don't have an account? <a href="#">Sign Up</a>
    </div>
</div>

<script>
    // Check if returning from OAuth
    const params = new URLSearchParams(window.location.search);
    const token = params.get('token');
    if (token) {
        localStorage.setItem('token', token);
        window.location.href = '/dashboard';
    }
</script>
</body>
</html>
